{% set e = explorer %}
<div class="toolbar-control">
  <select
    id="marker-picker"
    name="name"
    aria-label="Marker"
    hx-get="/marker{% if filter_qs %}?{{ filter_qs }}{% endif %}"
    hx-trigger="change"
    hx-target="#page-body"
    hx-swap="innerHTML"
    hx-include="this"
  >
    {% for m in e.available %}
      <option value="{{ m }}" {% if m == e.marker %}selected{% endif %}>{{ m }}</option>
    {% endfor %}
  </select>
</div>
