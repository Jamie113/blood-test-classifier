{% set e = explorer %}
<div class="toolbar-control">
  <label for="marker-picker">Showing</label>
  <select
    id="marker-picker"
    name="name"
    hx-get="/marker{% if filter_qs %}?{{ filter_qs }}{% endif %}"
    hx-trigger="change"
    hx-target="#page-body"
    hx-swap="innerHTML"
    hx-include="this"
  >
    {% for m in e.available %}
      <option value="{{ m }}" {% if m == e.marker %}selected{% endif %}>{{ m }}</option>
    {% endfor %}
  </select>
  <span class="toolbar-status">
    {% if e.is_auto %}auto-picked: clearest split &nbsp;·&nbsp; {% endif %}{{ e.n_components }} groups · {{ e.n_patients }} tests
  </span>
</div>
